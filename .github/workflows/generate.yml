name: Generate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [stable, preview]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up BDS
        id: setup
        run: bash scripts/setup_bds.sh
        env:
          CHANNEL: ${{ matrix.channel }}

      - name: Extract tags
        run: python3 scripts/extract_tags.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bedrock-tags-${{ matrix.channel }}
          path: |
            items.json
            blocks.json

      - name: Create release
        run: |
          VERSION="${{ steps.setup.outputs.bds_version }}"
          TAG="v${VERSION}"
          if [ "${{ matrix.channel }}" = "preview" ]; then
            TAG="${TAG}-preview"
            EXTRA_FLAGS="--prerelease"
          else
            EXTRA_FLAGS=""
          fi
          if ! gh release view "$TAG" &>/dev/null; then
            gh release create "$TAG" items.json blocks.json \
              --title "Bedrock ${VERSION}" \
              --notes "Tag data extracted from Bedrock Dedicated Server ${VERSION}." \
              $EXTRA_FLAGS
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit updated tags
        run: |
          DEST="${{ matrix.channel }}/"
          mkdir -p "$DEST"
          cp items.json "${DEST}items.json"
          cp blocks.json "${DEST}blocks.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST}items.json" "${DEST}blocks.json"
          git diff --cached --quiet || git commit -m "update ${{ matrix.channel }} tags for BDS ${{ steps.setup.outputs.bds_version }}"
          git pull --rebase
          git push
