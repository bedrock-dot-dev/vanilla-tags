name: Generate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [stable, preview]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get install -y unzip jq

      - name: Set up BDS
        run: bash scripts/setup_bds.sh
        env:
          CHANNEL: ${{ matrix.channel }}

      - name: Extract tags
        id: extract
        run: python3 scripts/extract_tags.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bedrock-tags-${{ matrix.channel }}
          path: |
            items.json
            blocks.json

      - name: Check for existing release
        id: check
        run: |
          if [ "${{ matrix.channel }}" = "preview" ]; then
            TAG="v${{ steps.extract.outputs.bds_version }}-preview"
          else
            TAG="v${{ steps.extract.outputs.bds_version }}"
          fi
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: bash scripts/publish_release.sh
        env:
          BDS_VERSION: ${{ steps.extract.outputs.bds_version }}
          CHANNEL: ${{ matrix.channel }}
          GH_TOKEN: ${{ github.token }}

      - name: Commit updated tags
        run: |
          DEST="${{ matrix.channel }}/"
          mkdir -p "$DEST"
          cp items.json "${DEST}items.json"
          cp blocks.json "${DEST}blocks.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEST}items.json" "${DEST}blocks.json"
          git diff --cached --quiet || git commit -m "update ${{ matrix.channel }} tags for BDS ${{ steps.extract.outputs.bds_version }}"
          git push
